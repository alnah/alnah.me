baseURL: https://alnah.io
title: alnah.io
theme: stack

languageCode: en

outputs:
  home:
    - HTML
  page:
    - HTML

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: true
    lineNumbersInTable: true
    tabWidth: 4

menu:
  main:
    - identifier: home
      name: Home
      url: /
      weight: -100
      params:
        icon: home
    - identifier: github
      name: GitHub
      url: https://github.com/alnah
      weight: -90
      params:
        icon: brand-github
        newTab: true
  social: []

params:
  favicon: /favicon-32.png
  mainSections:
    - post
  sidebar:
    subtitle: Building reliable tools and systems in Go
    avatar:
      enabled: true
      local: true
      src: img/avatar.png
  widgets:
    homepage:
      - type: search
      - type: archives
        params:
          limit: 5
      - type: categories
        params:
          limit: 10
      - type: tag-cloud
        params:
          limit: 10
    page:
      - type: toc
  comments:
    enabled: true
    provider: giscus
    giscus:
      repo: alnah/alnah.io
      repoID: R_kgDOQ5qkCA
      category: Comments
      categoryID: DIC_kwDOQ5qkCM4C08g7
      mapping: pathname
      reactionsEnabled: 1
      emitMetadata: 0
      inputPosition: top
      lightTheme: light
      darkTheme: dark_dimmed
