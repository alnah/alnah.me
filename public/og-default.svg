<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">alnah.me default social image</title>
  <desc id="desc">Centered an mark above alnah.me on a warm background.</desc>

  <defs>
    <filter id="cardShadow" x="-24%" y="-24%" width="148%" height="148%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#a99584" flood-opacity="0.2" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#f4eee2" />

  <g transform="translate(600 302)">
    <rect x="-180" y="-212" width="360" height="360" rx="66" fill="#f9f9f9" filter="url(#cardShadow)" />
    <text
      x="0"
      y="-34"
      text-anchor="middle"
      dominant-baseline="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="186"
      font-weight="700"
      letter-spacing="-5"
      fill="#88532f"
    >an</text>
    <text
      x="0"
      y="230"
      text-anchor="middle"
      dominant-baseline="middle"
      font-family="'Source Serif 4', Georgia, serif"
      font-size="62"
      font-weight="400"
      letter-spacing="1"
      fill="#4f4a4b"
    >alnah.me</text>
  </g>
