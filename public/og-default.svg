<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">alnah.me default social image</title>
  <desc id="desc">Centered Buttondown avatar badge with a large mono alnah.me label on a warm background.</desc>

  <rect width="1200" height="630" fill="#f4eee2" />

  <image
    href="buttondown-avatar.png"
